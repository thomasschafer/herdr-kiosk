version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-patch-updates:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions-updates:
        applies-to: version-updates
        patterns:
          - "*"
